services:
  homelab:
    build: .
    image: homelab-dashboard:latest
    container_name: homelab
    restart: unless-stopped
    ports:
      - "80:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      HOMELAB_REFRESH_MS: "10000"
    labels:
      homelab.name: "Homelab"
      homelab.description: "Catálogo do homelab"
      homelab.group: "System"
      homelab.icon: "https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/homepage.png"
